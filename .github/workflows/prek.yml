name: prek

on:
  pull_request:
  push:
    branches: [main]

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dev dependencies (skip building the C extension)
        run: uv sync --no-install-project --group dev

      - name: Run prek
        env:
          UV_NO_SYNC: "1"
        run: uv run prek run --all-files --show-diff-on-failure
